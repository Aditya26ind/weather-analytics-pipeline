version: 2

models:
  - name: stg_weather__observations
    description: Cleaned and typed hourly weather observations
    columns:
      - name: observation_id
        tests:
          - unique
          - not_null
      - name: city_name
        tests:
          - not_null
      - name: observed_at
        tests:
          - not_null
      - name: temperature_celsius
        tests:
          - not_null
      - name: apparent_temperature
        description: Feels-like temperature accounting for wind and humidity (°C)
        tests:
          - not_null
      - name: relative_humidity_pct
        description: Relative humidity percentage (0–100)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: precipitation_mm
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: wind_speed_kmh
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
