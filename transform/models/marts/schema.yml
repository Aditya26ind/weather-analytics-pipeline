version: 2

models:
  - name: mart_weather__city_stats
    description: Final analytics table — lifetime weather stats per tracked city
    columns:
      - name: city_name
        tests:
          - unique
          - not_null
      - name: days_tracked
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
      - name: temp_range_celsius
        description: All-time temperature range (max - min) across tracked days
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: avg_apparent_temp_celsius
        description: Average feels-like temperature across all tracked days (°C)
        tests:
          - not_null
      - name: avg_relative_humidity_pct
        description: Average relative humidity across all tracked days (%)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: total_precipitation_mm
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

  - name: mart_weather__extreme_days
    description: >
      Top-5 extreme weather days per city across five dimensions: hottest,
      coldest, wettest, most humid, and windiest. A day may appear multiple
      times if it ranks in more than one category.
    columns:
      - name: city_name
        tests:
          - not_null
      - name: observation_date
        tests:
          - not_null
      - name: hottest_rank
        description: Rank within city by max daily temperature (1 = hottest); may exceed 5 when row qualifies via another category
      - name: coldest_rank
        description: Rank within city by min daily temperature (1 = coldest); may exceed 5 when row qualifies via another category
      - name: wettest_rank
        description: Rank within city by total daily precipitation (1 = wettest); may exceed 5 when row qualifies via another category
      - name: is_notable_day
        tests:
          - not_null
