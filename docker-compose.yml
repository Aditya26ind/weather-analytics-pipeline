services:
  postgres:
    image: postgres:15-alpine
    container_name: warehouse
    environment:
      POSTGRES_USER: ${WAREHOUSE_USER:-warehouse}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD:-warehouse}
      POSTGRES_DB: ${WAREHOUSE_DB:-analytics}
    ports:
      - "${WAREHOUSE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_USER:-warehouse} -d ${WAREHOUSE_DB:-analytics}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingestion:
    build:
      context: ./ingestion
    container_name: ingestion
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      WAREHOUSE_HOST: postgres
      WAREHOUSE_PORT: 5432
      WAREHOUSE_USER: ${WAREHOUSE_USER:-warehouse}
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-warehouse}
      WAREHOUSE_DB: ${WAREHOUSE_DB:-analytics}
      PAST_DAYS: ${PAST_DAYS:-7}

  test-ingestion:
    build:
      context: ./ingestion
    container_name: test-ingestion
    command: ["python", "-m", "pytest", "tests/", "-v"]

  dbt:
    build:
      context: ./transform
    container_name: dbt
    depends_on:
      ingestion:
        condition: service_completed_successfully
    environment:
      WAREHOUSE_HOST: postgres
      WAREHOUSE_PORT: 5432
      WAREHOUSE_USER: ${WAREHOUSE_USER:-warehouse}
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-warehouse}
      WAREHOUSE_DB: ${WAREHOUSE_DB:-analytics}
      DBT_PROFILES_DIR: /dbt

  airflow:
    build:
      context: ./orchestration
    container_name: airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${WAREHOUSE_USER:-warehouse}:${WAREHOUSE_PASSWORD:-warehouse}@postgres:5432/airflow"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "dev-secret-change-in-prod"
      WAREHOUSE_HOST: postgres
      WAREHOUSE_PORT: "5432"
      WAREHOUSE_USER: ${WAREHOUSE_USER:-warehouse}
      WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-warehouse}
      WAREHOUSE_DB: ${WAREHOUSE_DB:-analytics}
      PAST_DAYS: ${PAST_DAYS:-7}
      DBT_PROFILES_DIR: /dbt
    volumes:
      - ./orchestration/dags:/opt/airflow/dags:ro
      - ./ingestion/src:/opt/ingestion_src:ro
      - ./transform:/dbt
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  airflow_logs:
